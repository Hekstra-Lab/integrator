# CUDA (GPU) runtime environment for the integrator project.

# Same as environment.yml but pulls the conda-forge CUDA build of PyTorch.
# DIALS and PyTorch both come from conda-forge.

# Instructions:
#   micromamba env create -f environment-cuda.yml
#   micromamba activate integrator-cuda

# To pin a specific CUDA toolkit (match the cluster driver), add e.g.
#   - cuda-version=12.4
# under dependencies. The =cuda* build string selects the GPU build.

name: integrator-cuda
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - dials=3.26
  # GPU PyTorch from conda-forge. 
  - pytorch-gpu=2.9
  - torchvision=0.24
  - pytorch-lightning>=2.2
  # additional dependencies
  - numpy>=2.3
  - scipy>=1.11
  - pandas>=2.3
  - h5py>=3.15
  - matplotlib-base>=3.5
  - polars>=1.6
  - rich>=14
  - pip
  - pip:
      - laue-dials
      - "reciprocalspaceship @ git+https://github.com/rs-station/reciprocalspaceship"
      - "-e ."
