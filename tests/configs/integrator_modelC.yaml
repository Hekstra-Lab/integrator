global_vars:
  encoder_out: &encoder_out 32
  mc_samples: &mc_samples 100
  data_dir: &data "/n/hekstra_lab/people/aldama/integrator_data/simulated_data/hermite"
  d: &d 1
  h: &h 21
  w: &w 21

integrator:
  name: modelc
  args:
    data_dim: "2d"
    d: *d
    h: *h
    w: *w
    lr: 0.001
    encoder_out: *encoder_out
    weight_decay: 0.0
    mc_samples: *mc_samples
    renyi_scale: 0.0
    predict_keys:
      - refl_ids
      - is_test
      - qi_mean
      - qi_var
      - qi_pred_var
      - qi_params
      - qp_mean
      - qp_mu_h
      - qp_std_h
      - qbg_mean
      - qbg_var
      - qbg_params
      - intensity
      - background
      - q_ib_mu_I
      - q_ib_mu_B
      - q_ib_L11
      - q_ib_L21
      - q_ib_L22
      - ib_log_space_correlation

# ModelC expects exactly 2 encoders, matched positionally:
#   1st → "profile"   (ShoeboxEncoderArgs)
#   2nd → "intensity" (IntensityEncoderArgs) — feeds q_ib only
encoders:
  - name: shoebox_encoder
    args:
      data_dim: 2d
      input_shape: [*h, *w]
      in_channels: 1
      encoder_out: *encoder_out
      conv1_out_channels: 16
      conv1_kernel_size: [3, 3]
      conv1_padding: [1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [2, 2]
      pool_stride: [2, 2]
      conv2_out_channels: 32
      conv2_kernel_size: [3, 3]
      conv2_padding: [0, 0]
      norm2_num_groups: 4
  - name: intensity_encoder
    args:
      data_dim: 2d
      in_channels: 1
      encoder_out: *encoder_out
      conv1_out_channels: 16
      conv1_kernel_size: [3, 3]
      conv1_padding: [1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [2, 2]
      pool_stride: [2, 2]
      conv2_out_channels: 32
      conv2_kernel_size: [3, 3]
      conv2_padding: [0, 0]
      norm2_num_groups: 4
      conv3_out_channels: 64
      conv3_kernel_size: [3, 3]
      conv3_padding: [1, 1]
      norm3_num_groups: 8

surrogates:
  qp:
    name: fixed_basis_profile
    args:
      input_dim: *encoder_out
      basis_path: 'profile_basis.pt'  # resolved against data_dir at runtime
  q_ib:
    name: bivariate_log_normal
    args:
      in_features: *encoder_out
      eps: 1.0e-03

loss:
  name: default
  args:
    mc_samples: *mc_samples
    eps: 1.0e-06
    pprf_cfg:
      name: gaussian_profile
      weight: 1.0
    pbg_cfg:
      name: gamma
      params:
        concentration: 1
        rate: 1
      weight: 1.0
    pi_cfg:
      name: gamma
      params:
        concentration: 1
        rate: 0.001
      weight: 1.0

data_loader:
  name: simulated_data
  args:
    data_dir: *data
    batch_size: 2014
    val_split: 0.2
    test_split: 0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: *data
      counts: counts.pt
      masks: masks.pt
      stats: stats_anscombe.pt
      reference: reference.pt
      standardized_counts: null
    D: *d
    H: *h
    W: *w
    anscombe: true

trainer:
  max_epochs: 1000
  accelerator: gpu
  devices: 1
  logger: true
  precision: "32"
  check_val_every_n_epoch: 50
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

logger:
  d: *d
  h: *h
  w: *w
