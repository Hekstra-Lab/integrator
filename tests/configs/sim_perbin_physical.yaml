global_vars:
  encoder_out: &encoder_out 32
  mc_samples: &mc_samples 100
  data_dir: &data "/n/hekstra_lab/people/aldama/integrator_data/simulated_data/res_bin_wilson"
  d: &d 1
  h: &h 21
  w: &w 21
integrator:
  name: hierarchicalC
  args:
    data_dim: "2d"
    d: *d
    h: *h
    w: *w
    lr: 0.001
    encoder_out: *encoder_out
    weight_decay: 0.0
    mc_samples: *mc_samples
    renyi_scale: 0.0
    predict_keys:
      - refl_ids
      - is_test
      - qi_mean
      - qi_var
      - qp_mean
      - qbg_mean
      - qbg_var
      - intensity
      - background
      - group_label
      - tau_per_refl
encoders:
  # profile
  - name: shoebox_encoder
    args:
      data_dim: 2d
      input_shape: [*h, *w]
      in_channels: 1
      encoder_out: *encoder_out
      conv1_out_channels: 16
      conv1_kernel_size: [3, 3]
      conv1_padding: [1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [2, 2]
      pool_stride: [2, 2]
      conv2_out_channels: 32
      conv2_kernel_size: [3, 3]
      conv2_padding: [0, 0]
      norm2_num_groups: 4
  # k_i
  - name: intensity_encoder
    args:
      data_dim: 2d
      in_channels: 1
      encoder_out: *encoder_out
      conv1_out_channels: 16
      conv1_kernel_size: [3, 3]
      conv1_padding: [1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [2, 2]
      pool_stride: [2, 2]
      conv2_out_channels: 32
      conv2_kernel_size: [3, 3]
      conv2_padding: [0, 0]
      norm2_num_groups: 4
      conv3_out_channels: 64
      conv3_kernel_size: [3, 3]
      conv3_padding: [1, 1]
      norm3_num_groups: 8
  # r_i
  - name: intensity_encoder
    args:
      data_dim: 2d
      in_channels: 1
      encoder_out: *encoder_out
      conv1_out_channels: 16
      conv1_kernel_size: [3, 3]
      conv1_padding: [1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [2, 2]
      pool_stride: [2, 2]
      conv2_out_channels: 32
      conv2_kernel_size: [3, 3]
      conv2_padding: [0, 0]
      norm2_num_groups: 4
      conv3_out_channels: 64
      conv3_kernel_size: [3, 3]
      conv3_padding: [1, 1]
      norm3_num_groups: 8
  # k_bg
  - name: intensity_encoder
    args:
      data_dim: 2d
      in_channels: 1
      encoder_out: *encoder_out
      conv1_out_channels: 16
      conv1_kernel_size: [3, 3]
      conv1_padding: [1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [2, 2]
      pool_stride: [2, 2]
      conv2_out_channels: 32
      conv2_kernel_size: [3, 3]
      conv2_padding: [0, 0]
      norm2_num_groups: 4
      conv3_out_channels: 64
      conv3_kernel_size: [3, 3]
      conv3_padding: [1, 1]
      norm3_num_groups: 8
  # r_bg
  - name: intensity_encoder
    args:
      data_dim: 2d
      in_channels: 1
      encoder_out: *encoder_out
      conv1_out_channels: 16
      conv1_kernel_size: [3, 3]
      conv1_padding: [1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [2, 2]
      pool_stride: [2, 2]
      conv2_out_channels: 32
      conv2_kernel_size: [3, 3]
      conv2_padding: [0, 0]
      norm2_num_groups: 4
      conv3_out_channels: 64
      conv3_kernel_size: [3, 3]
      conv3_padding: [1, 1]
      norm3_num_groups: 8
surrogates:
  qp:
    name: physical_gaussian_surrogate
    args:
      input_dim: *encoder_out
      basis_path: profile_basis.pt
  qbg:
    name: gammaB
    args:
      in_features: *encoder_out
      eps: 0.00001
  qi:
    name: gammaB
    args:
      in_features: *encoder_out
      eps: 0.00001
loss:
  name: per_bin
  args:
    mc_samples: *mc_samples
    eps: 0.00001
    tau_per_group: tau_per_group.pt
    bg_rate_per_group: bg_rate_per_group.pt
    pprf_weight: 1.0
    pbg_weight: 1.0
    pi_weight: 1.0
data_loader:
  name: simulated_data
  args:
    data_dir: *data
    batch_size: 2014
    val_split: 0.2
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: *data
      counts: counts.pt
      masks: masks.pt
      stats: stats_anscombe.pt
      reference: reference.pt
      standardized_counts: null
    D: *d
    H: *h
    W: *w
    anscombe: true
trainer:
  max_epochs: 1000
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 50
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
logger:
  d: *d
  h: *h
  w: *w
