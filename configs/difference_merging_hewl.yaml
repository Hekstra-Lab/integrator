# Difference-as-latent per-HKL merging (difference_merging integrator).
#
# Recovers the anomalous signal in its own coordinate: the merge emits a common
# mode q(I0) [Wilson prior on I0 only] and a signed anomalous fraction q(delta)
# [N(0, sigma_delta(shell)^2)], with I(+/-) = I0 (1 +/- delta). sigma_delta is
# learned per resolution shell (in-model empirical Bayes). Centrics are pinned to
# delta = 0. This is the structural fix for the I(+)/I(-) washout: the Wilson
# prior regularizes the magnitude, not the mates.
#
# Clean anomalous baseline: no antisymmetric scale inputs (s1 off), no
# double-Wilson, no consistency-pool (all audited as anomalous-signal leaks).

integrator:
  name: difference_merging
  args:
    data_dim: 3d
    d: 3
    h: 21
    w: 21
    encoder_out: 64
    mc_samples: 100
    log_intensity_scatter: true
    log_background_scatter: true

    anomalous: true           # per-mate buffers on miller_idx_unfriedelized
    wilson_alpha: 1.0
    merge_kl_weight: 1.0
    wilson_centric_prior: true
    scaling_lr: 0.005

    # --- difference-as-latent ---
    delta_kl_weight: 1.0
    sigma_delta_init: 0.05    # initial anomalous-fraction std
    sigma_delta_learn: true   # learn sigma_delta (in-model empirical Bayes)
    delta_head_hidden: 16
    # Prior form for sigma_delta(d): loglinear softplus(a+b s^2) (2 params,
    # ~Wilson-B, best for a smooth envelope) | binned | cheby | mlp. Continuous
    # forms read s^2 directly and ignore n_bins for sigma_delta.
    sigma_delta_form: loglinear
    sigma_delta_cheby_degree: 4

    # anomalous-signal leaks: keep OFF
    consistency_weight: 0.0
    consistency_pool_friedel: false
    double_wilson_weight: 0.0

    # --- MLP scale (smooth, Friedel-blind: no s1) ---
    dmin: 1.0
    scale_mlp: true
    scale_mlp_hidden: 128
    scale_mlp_layers: 4
    scale_head_init_std: 0.05
    scale_sh_lmax: 4
    scale_mlp_absorption: false   # even-l SH is Friedel-safe; enable if available
    scale_mlp_absorption_even_only: true
    predict_keys: [refl_ids, is_test, qi_mean, qi_var, qbg_mean, qbg_var,
      intensity.prf.value, intensity.prf.variance, background.mean, d,
      group_label, qp_mean, qp_loc, qp_scale,
      miller_idx_unfriedelized, miller_idx_friedelized]

optimizer:
  lr: 0.001
  weight_decay: 0.0
  decoder_weight_decay: 0.0
  lr_schedule: null
  warmup_steps: 1000

encoders:
- name: profile_encoder
  args:
    data_dim: 3d
    input_shape: [3, 21, 21]
    conv1_out_channels: 64
    conv2_out_channels: 128
    dropout: 0.2
- &intensity
  name: intensity_encoder
  args:
    data_dim: 3d
    conv1_out_channels: 64
    conv2_out_channels: 128
    conv3_out_channels: 256
- *intensity
- *intensity
- *intensity

surrogates:
  qp:
    name: learned_basis_profile
    args:
      latent_dim: 12
      init_std: 0.5
      prior_scale: 3.0
      smoothness_weight: 0.02
  qbg:
    name: gamma
    args:
      reparameterization: mean_fano
      eps: 1.0e-06
      k_min: 0.01

loss:
  name: merging_wilson
  args:
    lp_correction: false
    n_bins: 30                  # per-resolution background prior bins (also the
                                # sigma_delta shells only if sigma_delta_form: binned)
    use_gb: false
    profile_kl_weight: 1.0
    background_kl_weight: 1.0

data_loader:
  name: rotation_data
  args:
    data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/scaling_dataset
    batch_size: 2048
    validation_split: 0.2
    num_workers: 8
    include_test: true
    subset_size: null
    resolution_cutoff: null
    transform: anscombe
    group_by_asu_id: true
    group_by_key: miller_idx_friedelized   # co-batch I(+)/I(-) mates (required)
    split_by_miller_idx: true
    test_split: 0.1
    max_obs_per_hkl: null
    ice_ring_ranges: null
    shoebox_file_names:
      data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/scaling_dataset
      counts: counts.npy
      masks: masks.npy
      reference: metadata.npy

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

checkpoint:
  every_n_epochs: 5
  save_top_k: -1
