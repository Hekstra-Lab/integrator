integrator:
  name: hierarchical_ragged
  args:
    data_dim: 3d
    d: &d 9
    h: &h 31
    w: &w 31
    lr: 0.001
    encoder_out: &encoder_out 64
    weight_decay: 0.0
    lr_schedule: step_linear_warmup
    warmup_steps: 500
    mc_samples: &mc_samples 100
    predict_keys:
      [refl_ids, qi_mean, qi_var, qbg_mean, qbg_var,
       intensity.prf.value, intensity.prf.variance, background.mean,
       d, group_label, qp_mean, qp_mu_h, qp_std_h]

encoders:
- name: ragged_shoebox_encoder
  args:
    in_channels: 1
    encoder_out: *encoder_out
    conv1_out_channels: 64
    conv1_kernel_size: [1, 3, 3]
    conv1_padding: [0, 1, 1]
    norm1_num_groups: 4
    pool_kernel_size: [1, 2, 2]
    pool_stride: [1, 2, 2]
    conv2_out_channels: 128
    conv2_kernel_size: [3, 3, 3]
    conv2_padding: [1, 1, 1]
    norm2_num_groups: 4
    dropout: 0.0
- &intensity_enc
  name: ragged_intensity_encoder
  args:
    in_channels: 1
    encoder_out: *encoder_out
    conv1_out_channels: 64
    conv1_kernel_size: [3, 3, 3]
    conv1_padding: [1, 1, 1]
    norm1_num_groups: 4
    pool_kernel_size: [1, 2, 2]
    pool_stride: [1, 2, 2]
    conv2_out_channels: 128
    conv2_kernel_size: [3, 3, 3]
    conv2_padding: [1, 1, 1]
    norm2_num_groups: 4
    conv3_out_channels: 256
    conv3_kernel_size: [3, 3, 3]
    conv3_padding: [1, 1, 1]
    norm3_num_groups: 8
- *intensity_enc
- *intensity_enc
- *intensity_enc

surrogates:
  qp:
    name: ragged_learned_basis_profile
    args:
      input_dim: *encoder_out
      d_basis: 8
      basis_hidden: 64
      init_std: 0.5
  qbg:
    name: gammaA
    args:
      in_features: *encoder_out
      eps: 1.0e-06
      k_min: 0.1
      positive_constraint: log
      k_init: 30.0
      r_init: 1.0
      zero_head_weights: true
  qi:
    name: gammaA
    args:
      in_features: *encoder_out
      eps: 1.0e-06
      k_min: 0.1
      positive_constraint: log
      k_init: 100.0
      r_init: 1.0
      zero_head_weights: true

loss:
  name: wilson
  args:
    mc_samples: *mc_samples
    eps: 1.0e-06
    n_bins: 30
    bg_rate_per_group: bg_rate_per_group.pt
    profile_sigma_prior: 3.0
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0

data_loader:
  name: ragged_data
  args:
    data_dir: &data_dir /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data_dials
    batch_size: 128
    val_frac: 0.05
    test_frac: 0.05
    num_workers: 4
    bucket_mult: 50
    keys: ["mask"]
    seed: 0
    eager: true
    transform: log1p
    anscombe: true
    max_count: 131072.0
    protect_foreground: true
    min_valid_pixels: 10
    group_labels_path: group_labels_30.pt
    extra_metadata_keys: []

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

logger:
  d: *d
  h: *h
  w: *w

output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data_dials/reflections.refl
