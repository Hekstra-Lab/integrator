integrator:
  name: hierarchical
  args:
    data_dim: 2d
    d: &d 1
    h: &h 25
    w: &w 25
    lr: 0.001
    encoder_out: &encoder_out 32
    weight_decay: 0.0
    decoder_weight_decay: 1.0e-3
    qp_smoothness_weight: 1.0e-3
    qp_orthogonality_weight: 1.0e-2
    lr_schedule: cosine_warmup
    warmup_epochs: 5
    lr_min: 1.0e-5
    mc_samples: &mc_samples 24
    predict_keys:
      [refl_ids, qi_mean, qi_var, qbg_mean, qbg_var,
       intensity.sum.value, intensity.sum.variance,
       background.sum.value, background.sum.variance,
       d, wavelength, group_label, qp_mean]

encoders:
- name: shoebox_encoder
  args:
    data_dim: 2d
    input_shape: [*h, *w]
    encoder_out: *encoder_out
    conv1_out_channels: 16
    conv2_out_channels: 32
- &intensity_enc
  name: intensity_encoder
  args:
    data_dim: 2d
    encoder_out: *encoder_out
    conv1_out_channels: 16
    conv2_out_channels: 32
    conv3_out_channels: 64
- *intensity_enc
- *intensity_enc
- *intensity_enc

surrogates:
  qp:
    name: learned_basis_profile
    args:
      input_dim: *encoder_out
      output_dim: 625
      init_std: 0.5
      warmstart_basis_path: hermite_profile_basis.pt
  qbg:
    name: gammaA
    args:
      in_features: *encoder_out
      eps: 1.0e-06
      k_min: 0.01
      positive_constraint: log
  qi:
    name: gammaA
    args:
      in_features: *encoder_out
      eps: 1.0e-06
      k_min: 0.01
      positive_constraint: log

loss:
  name: poly_wilson
  args:
    mc_samples: *mc_samples
    eps: 1.0e-06
    n_bins: 30
    n_lambda_bins: 8
    bg_rate_per_group: bg_rate_per_group.pt
    profile_sigma_prior: 1.0
    profile_basis_type: hermite
    profile_basis_max_order: 6
    profile_basis_sigma_ref: 1.0
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0

data_loader:
  name: poly_data
  args:
    data_dir: &data_dir /n/hekstra_lab/people/aldama/integrator_data/hewl_1118/pytorch_data
    batch_size: 512
    val_split: 0.2
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: *data_dir
      counts: counts.npy
      masks: masks.npy
      stats: anscombe_stats.pt
      reference: metadata.pt
      standardized_counts: null
    D: *d
    H: *h
    W: *w
    anscombe: true

trainer:
  max_epochs: 10
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

logger:
  d: *d
  h: *h
  w: *w
