# Coset ablation — arm 3/3: SUPERVISED + REMOVED KL (Option C)
# No rate override (rate = I*prf + bg) so background-only counts pull coset
# intensity to the floor; intensity/profile KL DROPPED for cosets (background KL kept).
# Micro network sizes (encoder_out 32, convs 16/32/64); lp_correction left off
# (the merged dataset's loader does not carry `lp`).
# Identical to override.yaml and override_no_kl.yaml except `coset_mode`.
integrator:
  name: hierarchical
  args:
    data_dim: 3d
    d: &d 3
    h: &h 21
    w: &w 21
    lr: 0.001
    encoder_out: &encoder_out 32
    weight_decay: 0.0
    decoder_weight_decay: 0.0
    qp_smoothness_weight: 1.0e-2
    qp_orthogonality_weight: 0.0
    mc_samples: &mc_samples 100
    coset_mode: supervised
    predict_keys:
      [refl_ids, is_test, qi_mean, qi_var, qbg_mean, qbg_var,
       intensity.prf.value, intensity.prf.variance, background.mean,
       d, group_label, qp_mean, qp_loc, qp_scale, is_coset]

encoders:
- name: profile_encoder
  args:
    data_dim: 3d
    input_shape: [*d, *h, *w]
    encoder_out: *encoder_out
    conv1_out_channels: 16
    conv2_out_channels: 32
- &intensity_enc
  name: intensity_encoder
  args:
    data_dim: 3d
    encoder_out: *encoder_out
    conv1_out_channels: 16
    conv2_out_channels: 32
    conv3_out_channels: 64
- *intensity_enc
- *intensity_enc
- *intensity_enc

surrogates:
  qp:
    name: learned_basis_profile
    args:
      input_dim: *encoder_out
      latent_dim: 14
      output_dim: 1323
      init_std: 0.5
  qbg:
    name: gammaB
    args:
      in_features: *encoder_out
      eps: 1.0e-06
      k_min: 0.01
      mu_positive_constraint: exp
  qi:
    name: gammaB
    args:
      in_features: *encoder_out
      eps: 1.0e-06
      k_min: 0.01
      mu_positive_constraint: exp

loss:
  name: monochromatic_wilson
  args:
    mc_samples: *mc_samples
    eps: 1.0e-06
    n_bins: 30
    profile_prior_scale: 3.0
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0

data_loader:
  name: rotation_data
  args:
    data_dir: &data_dir /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/merged_pytorch_data
    batch_size: 2048
    val_split: 0.2
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: *data_dir
      counts: counts.npy
      masks: masks.npy
      stats: anscombe_stats.pt
      reference: metadata.pt
      standardized_counts: null
    D: *d
    H: *h
    W: *w
    anscombe: true

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

checkpoint:
  every_n_epochs: 5   # save once every 5 epochs instead of every epoch
  save_top_k: -1      # keep all saved checkpoints (set to e.g. 3 to keep only the last few)

logger:
  d: *d
  h: *h
  w: *w

output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data/reflections_.refl
  dials_merge_html: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/merged_reference.html
  phenix_refine_log: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/refine_001.log
  anomalous_peaks: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/reference_peaks.csv
  phenix_eff: /n/holylabs/LABS/hekstra_lab/Users/laldama/integrato_refac/integrator/reference_data/phenix.eff
  pdb: /n/holylabs/LABS/hekstra_lab/Users/laldama/integrato_refac/integrator/reference_data/9b7c.pdb
  expt_file: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/dials_2026-05-14/integrated.expt
