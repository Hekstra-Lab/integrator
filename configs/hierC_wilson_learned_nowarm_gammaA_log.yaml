# Mirror of hierC_wilson_learned_nowarm_gammaA.yaml with qi/qbg switched
# to gammaA's log parameterization. Direct A/B comparison: same dataset
# (HEWL 9b7c), same encoders, same loss config, same trainer — only the
# Gamma surrogate's activation differs.
#
# Hypothesis: log mode (k = exp(raw_k) + k_min, r = exp(raw_r) + eps)
# lets gammaA's k span many decades, matching gammaB's CRLB-tracking
# noise-to-signal ratio at high intensity. Default softplus mode floors
# σ/μ at ~1e-2 because softplus is ~linear for large raw_k and the
# Kaiming-init head can't drive k beyond ~10⁴.
#
# k_init / r_init init the head biases so the chosen activation evaluates
# to the targets at step 0. zero_head_weights=true makes (k, r)
# uniform across reflections at init — kills the seed-to-seed grad-max
# spread that random Kaiming weights × encoder features inject.

global_vars:
  encoder_out: 64
  mc_samples: 100
  data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
  d: 3
  h: 21
  w: 21
integrator:
  name: hierarchicalC
  args:
    data_dim: 3d
    d: 3
    h: 21
    w: 21
    lr: 0.001
    encoder_out: 64
    weight_decay: 0.0
    decoder_weight_decay: 1.0e-3
    qp_smoothness_weight: 0.0
    qp_orthogonality_weight: 0.0
    qp_sparsity_weight: 0.0
    mc_samples: 100
    renyi_scale: 0.0
    predict_keys:
    - refl_ids
    - is_test
    - qi_mean
    - qi_var
    - qbg_mean
    - qbg_var
    - intensity.prf.value
    - intensity.prf.variance
    - background.mean
    - d
    - group_label
    - qp_mean
    - qp_mu_h
    - qp_std_h
encoders:
- name: shoebox_encoder
  args:
    data_dim: 3d
    input_shape: [3, 21, 21]
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size: [1, 3, 3]
    conv1_padding: [0, 1, 1]
    norm1_num_groups: 4
    pool_kernel_size: [1, 2, 2]
    pool_stride: [1, 2, 2]
    conv2_out_channels: 128
    conv2_kernel_size: [3, 3, 3]
    conv2_padding: [0, 0, 0]
    norm2_num_groups: 4
- &id001
  name: intensity_encoder
  args:
    data_dim: 3d
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size: [3, 3, 3]
    conv1_padding: [1, 1, 1]
    norm1_num_groups: 4
    pool_kernel_size: [1, 2, 2]
    pool_stride: [1, 2, 2]
    conv2_out_channels: 128
    conv2_kernel_size: [3, 3, 3]
    conv2_padding: [0, 0, 0]
    norm2_num_groups: 4
    conv3_out_channels: 256
    conv3_kernel_size: [3, 3, 3]
    conv3_padding: [1, 1, 1]
    norm3_num_groups: 8
- *id001
- *id001
- *id001
surrogates:
  qp:
    name: learned_basis_profile
    args:
      input_dim: 64
      latent_dim: 8
      output_dim: 1323
      init_std: 0.5
  qbg:
    name: gammaA
    args:
      in_features: 64
      eps: 1.0e-06
      k_min: 0.1
      separate_inputs: true
      parameterization: log
      # bg target ~1.0 with Poisson-like rate=1 at init
      # (HEWL 9b7c bg per-bin rate is roughly 1, ranges ~0.5–2 across
      # resolution shells). At init: mean = k/r = 1, σ/μ = 1/√k = 1.
      k_init: 1.0
      r_init: 1.0
      zero_head_weights: true
  qi:
    name: gammaA
    args:
      in_features: 64
      eps: 1.0e-06
      k_min: 0.1
      separate_inputs: true
      parameterization: log
      # Intensity target: k≈100 (Poisson at moderate Bragg peak),
      # r=1 (Poisson regime). At init: mean = 100, σ/μ ≈ 0.1.
      # Encoder learns deviations toward per-refl truth from there.
      k_init: 100.0
      r_init: 1.0
      zero_head_weights: true
loss:
  name: wilson
  args:
    mc_samples: 100
    eps: 1.0e-06
    n_bins: 25
    bg_rate_per_group: bg_rate_per_group.pt
    profile_sigma_prior: 3.0
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0
data_loader:
  name: default
  args:
    data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
    batch_size: 2048
    val_split: 0.2
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
      counts: counts.pt
      masks: masks.pt
      stats: anscombe_stats.pt
      reference: metadata.pt
      standardized_counts: null
    D: 3
    H: 21
    W: 21
    anscombe: true
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
logger:
  d: 3
  h: 21
  w: 21
output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data/reflections_.refl
  dials_merge_html: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/merged_reference.html
  phenix_refine_log: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/refine_001.log
  anomalous_peaks: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/reference_peaks.csv
