global_vars:
  encoder_out: &encoder_out 64
  mc_samples: &mc_samples 100
  data_dir: &data_dir /n/hekstra_lab/people/aldama/integrator_data/hewl_1118/pytorch_data
  d: &d 1
  h: &h 25
  w: &w 25

integrator:
  name: hierarchicalC
  args:
    data_dim: 2d
    d: *d
    h: *h
    w: *w
    lr: 0.001
    encoder_out: *encoder_out
    weight_decay: 0.0
    mc_samples: *mc_samples
    renyi_scale: 0.0
    predict_keys:
      - refl_ids
      - qi_mean
      - qi_var
      - qbg_mean
      - qbg_var
      - intensity.sum.value
      - intensity.sum.variance
      - background.sum.value
      - background.sum.variance
      - d
      - wavelength
      - group_label
      - qp_mean

encoders:
  - name: shoebox_encoder
    args:
      data_dim: 2d
      input_shape: [*h, *w]
      in_channels: 1
      encoder_out: *encoder_out
      conv1_out_channels: 64
      conv1_kernel_size: [3, 3]
      conv1_padding: [1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [2, 2]
      pool_stride: [2, 2]
      conv2_out_channels: 128
      conv2_kernel_size: [3, 3]
      conv2_padding: [0, 0]
      norm2_num_groups: 4
  - &intensity_enc
    name: intensity_encoder
    args:
      data_dim: 2d
      in_channels: 1
      encoder_out: *encoder_out
      conv1_out_channels: 64
      conv1_kernel_size: [3, 3]
      conv1_padding: [1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [2, 2]
      pool_stride: [2, 2]
      conv2_out_channels: 128
      conv2_kernel_size: [3, 3]
      conv2_padding: [0, 0]
      norm2_num_groups: 4
      conv3_out_channels: 256
      conv3_kernel_size: [3, 3]
      conv3_padding: [1, 1]
      norm3_num_groups: 8
  - *intensity_enc
  - *intensity_enc
  - *intensity_enc

surrogates:
  qp:
    name: learned_basis_profile
    args:
      input_dim: *encoder_out
      latent_dim: 8
      output_dim: 625   # h * w
      init_std: 0.5
  qbg:
    name: gammaB
    args:
      in_features: *encoder_out
      eps: 1.0e-06
      mean_init: null
      separate_inputs: true
  qi:
    name: gammaB
    args:
      in_features: *encoder_out
      eps: 1.0e-06
      mean_init: null
      mu_parameterization: log
      separate_inputs: true

loss:
  name: poly_wilson
  args:
    mc_samples: *mc_samples
    eps: 1.0e-06
    n_bins: 30
    n_lambda_bins: 8
    bg_rate_per_group: bg_rate_per_group.pt
    profile_sigma_prior: 3.0
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0

data_loader:
  name: poly_data
  args:
    data_dir: *data_dir
    batch_size: 256
    val_split: 0.2
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: *data_dir
      counts: counts.npy
      masks: masks.npy
      stats: anscombe_stats.pt
      reference: metadata.pt
      standardized_counts: null
    D: *d
    H: *h
    W: *w
    anscombe: true

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

logger:
  d: *d
  h: *h
  w: *w

output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/hewl_1118/pytorch_data/reflections_.refl
