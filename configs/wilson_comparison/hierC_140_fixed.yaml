# Fixed-pipeline HierarchicalIntegratorC on SBGrid dataset 140 (HSV-1 UL21).
#
# Mirror of hewl_9b7c/hierC_learned.yaml but pointed at dataset 140's
# fixed-size shoebox extraction (33 x 33 x 9 from refltorch.mksbox), with
# counts/masks stored as .npy instead of .pt.
#
# Required input layout under data_dir (produced by refltorch.mksbox +
# refltorch.add-overlap):
#   counts.npy            - raw uint16 / int32 pixel counts, (N, V) flat
#   masks.npy             - DIALS valid mask, (N, V) bool
#   masks_overlap.npy     - same masked AND ~overlap (use this if you ran add-overlap)
#   anscombe_stats.pt     - (mean, var) of Anscombe-transformed valid voxels
#   stats.pt              - (mean, var) of raw valid voxels
#   metadata.pt           - per-reflection scalars incl. d, refl_ids, etc.
#   identifiers.yaml      - experiment identifiers
#   reflections_.refl     - DIALS refl file w/ refl_ids column
#
# Shoebox shape is D=9, H=31, W=31 (= V=8649) per the user's mksbox run.

global_vars:
  encoder_out: 64
  mc_samples: 100
  data_dir: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data
  d: 9
  h: 31
  w: 31

integrator:
  name: hierarchicalC
  args:
    data_dim: 3d
    d: 9
    h: 31
    w: 31
    lr: 0.001
    encoder_out: 64
    weight_decay: 0.0
    mc_samples: 100
    renyi_scale: 0.0
    predict_keys:
      - refl_ids
      - is_test
      - qi_mean
      - qi_var
      - qbg_mean
      - qbg_var
      - intensity.prf.value
      - intensity.prf.variance
      - background.mean
      - d
      - group_label
      - qp_mean
      - qp_mu_h
      - qp_std_h

encoders:
  - name: shoebox_encoder
    args:
      data_dim: 3d
      input_shape: [9, 31, 31]
      in_channels: 1
      encoder_out: 64
      conv1_out_channels: 64
      conv1_kernel_size: [1, 3, 3]
      conv1_padding: [0, 1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [1, 2, 2]
      pool_stride: [1, 2, 2]
      conv2_out_channels: 128
      conv2_kernel_size: [3, 3, 3]
      conv2_padding: [0, 0, 0]
      norm2_num_groups: 4
  - &id001
    name: intensity_encoder
    args:
      data_dim: 3d
      in_channels: 1
      encoder_out: 64
      conv1_out_channels: 64
      conv1_kernel_size: [3, 3, 3]
      conv1_padding: [1, 1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [1, 2, 2]
      pool_stride: [1, 2, 2]
      conv2_out_channels: 128
      conv2_kernel_size: [3, 3, 3]
      conv2_padding: [0, 0, 0]
      norm2_num_groups: 4
      conv3_out_channels: 256
      conv3_kernel_size: [3, 3, 3]
      conv3_padding: [1, 1, 1]
      norm3_num_groups: 8
  # hierC needs four intensity-style encoders: k_i, r_i, k_bg, r_bg
  - *id001
  - *id001
  - *id001

surrogates:
  qp:
    name: learned_basis_profile
    args:
      input_dim: 64
      latent_dim: 8
      output_dim: 8649   # 9 * 31 * 31 — must match D*H*W
      init_std: 0.5
  qbg:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-06
  qi:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-06

loss:
  name: wilson
  args:
    mc_samples: 100
    eps: 1.0e-06
    n_bins: 30
    bg_rate_per_group: bg_rate_per_group.pt
    profile_sigma_prior: 3.0
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0

data_loader:
  name: default
  args:
    data_dir: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data
    batch_size: 2048
    val_split: 0.2
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data
      # .npy here — the data_module's _load_shoebox_array auto-detects
      # the suffix. Switch to masks_overlap.npy if you want the overlap-
      # corrected mask (recommended after running refltorch.add-overlap).
      counts: counts.npy
      masks: masks_overlap.npy
      stats: anscombe_stats.pt
      reference: metadata.pt
      standardized_counts: null
    D: 9
    H: 31
    W: 31
    anscombe: true

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

logger:
  d: 9
  h: 31
  w: 31

output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data/reflections_.refl
