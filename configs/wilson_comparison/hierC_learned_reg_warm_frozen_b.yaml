global_vars:
  encoder_out: 32
  mc_samples: 50
  data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
  d: 3
  h: 21
  w: 21
integrator:
  name: hierarchicalC
  args:
    data_dim: 3d
    d: 3
    h: 21
    w: 21
    lr: 0.001
    encoder_out: 32
    weight_decay: 0.0
    decoder_weight_decay: 1.0e-3
    qp_smoothness_weight: 1.0e-3
    qp_orthogonality_weight: 1.0e-2
    qp_sparsity_weight: 0.0
    lr_schedule: cosine_warmup
    warmup_epochs: 5
    lr_min: 1.0e-5
    mc_samples: 50
    renyi_scale: 0.0
    predict_keys:
    - refl_ids
    - is_test
    - qi_mean
    - qi_var
    - qbg_mean
    - qbg_var
    - intensity.prf.value
    - intensity.prf.variance
    - background.mean
    - d
    - group_label
    - qp_mean
    - qp_mu_h
    - qp_std_h
encoders:
- name: shoebox_encoder
  args:
    data_dim: 3d
    input_shape:
    - 3
    - 21
    - 21
    in_channels: 1
    encoder_out: 32
    conv1_out_channels: 16
    conv1_kernel_size:
    - 1
    - 3
    - 3
    conv1_padding:
    - 0
    - 1
    - 1
    norm1_num_groups: 4
    pool_kernel_size:
    - 1
    - 2
    - 2
    pool_stride:
    - 1
    - 2
    - 2
    conv2_out_channels: 32
    conv2_kernel_size:
    - 3
    - 3
    - 3
    conv2_padding:
    - 0
    - 0
    - 0
    norm2_num_groups: 4
    # Channel-wise Dropout3d after each conv+norm+relu block. Targets the
    # encoder-decoder co-adaptation overfitting we saw where train NLL
    # keeps dropping while val NLL plateaus and per-component KLs stay
    # constant. Only the profile encoder drops; intensity encoders stay
    # deterministic.
    dropout: 0.15
- &id001
  name: intensity_encoder
  args:
    data_dim: 3d
    in_channels: 1
    encoder_out: 32
    conv1_out_channels: 16
    conv1_kernel_size:
    - 3
    - 3
    - 3
    conv1_padding:
    - 1
    - 1
    - 1
    norm1_num_groups: 4
    pool_kernel_size:
    - 1
    - 2
    - 2
    pool_stride:
    - 1
    - 2
    - 2
    conv2_out_channels: 32
    conv2_kernel_size:
    - 3
    - 3
    - 3
    conv2_padding:
    - 0
    - 0
    - 0
    norm2_num_groups: 4
    conv3_out_channels: 64
    conv3_kernel_size:
    - 3
    - 3
    - 3
    conv3_padding:
    - 1
    - 1
    - 1
    norm3_num_groups: 8
- *id001
- *id001
- *id001
surrogates:
  qp:
    name: learned_basis_profile
    args:
      input_dim: 32
      latent_dim: 29
      output_dim: 1323
      init_std: 0.5
      # Warm-start decoder.weight (and decoder.bias) from a Hermite basis.
      # The file is auto-(re)generated by prepare_per_bin_priors using the
      # profile_basis_* parameters in loss.args. If you change sigma_ref
      # or sigma_z in the loss section, the provenance check detects the
      # mismatch and rewrites hermite_profile_basis_30.pt automatically —
      # no extra flags needed.
      warmstart_basis_path: hermite_profile_basis.pt
      # Freeze b = log(reference Gaussian). Only W (basis directions) is
      # learnable. 1323 fewer trainable parameters; h=0 always produces the
      # reference Gaussian; deformations are strictly perturbations of a
      # Gaussian baseline.
      freeze_bias: true
  qbg:
    name: gammaB
    args:
      in_features: 32
      eps: 1.0e-06
  qi:
    name: gammaB
    args:
      in_features: 32
      eps: 1.0e-06
loss:
  name: wilson
  args:
    mc_samples: 50
    eps: 1.0e-06
    n_bins: 30
    bg_rate_per_group: bg_rate_per_group.pt
    # Per-bin Gamma shape α for the bg prior. Fitted via Gamma MLE per
    # resolution bin in prepare_priors (DIALS background.mean by default).
    # Replaces the α=1 Exponential default: our diagnostic showed α ≈ 10–13
    # across bins, gaining ~0.7–0.9 nats/sample on bg loglik vs Exponential.
    # bg_rate_per_group still stores 1/mean — prior mean is preserved.
    bg_concentration_per_group: bg_concentration_per_group.pt
    profile_sigma_prior: 1.0
    # Hermite reference widths matching the empirical learned bias
    # (σ_xy ≈ 1.1, σ_z ≈ 0.4 inferred from softmax(b)). These drive the
    # auto-regeneration of hermite_profile_basis_30.pt via the provenance
    # check on the warmstart path above — no profile_basis_per_bin key
    # needed, and Wilson keeps its flat profile_sigma_prior=3.0 global
    # KL prior rather than switching to per-bin mu/std priors.
    profile_basis_type: hermite
    profile_basis_max_order: 4
    profile_basis_sigma_ref: 1.0
    profile_basis_sigma_z: 0.4
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0
data_loader:
  name: default
  args:
    data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
    batch_size: 2048
    val_split: 0.3
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
      counts: counts.pt
      masks: masks.pt
      stats: anscombe_stats.pt
      reference: metadata.pt
      standardized_counts: null
    D: 3
    H: 21
    W: 21
    anscombe: true
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
logger:
  d: 3
  h: 21
  w: 21
output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data/reflections_.refl
  dials_merge_html: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/merged_reference.html
  phenix_refine_log: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/refine_001.log
  anomalous_peaks: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/reference_peaks.csv
