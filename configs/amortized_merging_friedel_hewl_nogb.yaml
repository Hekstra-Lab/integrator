# Wilson B/G ablation OFF (use_gb: false, tau = 1): identical to
# amortized_merging_friedel_hewl.yaml except for the single loss.args.use_gb line.

# Standalone scaling model: NO BaseIntegrator parent, its own loss
# (merging_wilson), SUM mode only — the mean / attention / overdispersion modes
# and the non-MLP scales were dropped in the port. The per-observation scale is
# an MLP that carries the LP correction, so the Wilson prior must NOT
# (loss.args.lp_correction: false).

# Three anomalous-preserving terms are ON (set any weight to 0 to disable):
#   consistency_pool_friedel - data-only scaling consistency vs the +/- pooled mean
#   double_wilson_weight     - shrink paired mates' merged log-ratio
# The loader groups batches by miller_idx_friedelized so I(+) and I(-) of a
# reflection share a batch (those terms need both mates present); the merge
# itself is on miller_idx_unfriedelized (anomalous: true), so I(+) != I(-).

# DATA PREP (offline):
#   integrator.make_shoeboxes --anomalous ...   adds miller_idx_friedelized,
#       miller_idx_unfriedelized, centric, friedel_plus and records n_hkl in
#       dataset.yaml. Set integrator.args.n_hkl to dataset.yaml n_hkl.n_unfriedelized.
#   scale_mlp_absorption: true additionally needs an `absorption_sh` column in
#       the metadata (crystal-frame spherical harmonics). Set it false to train
#       on the plain make_shoeboxes output.

integrator:
  name: amortized_merging
  args:
    data_dim: 3d
    d: 3
    h: 21
    w: 21
    encoder_out: 64
    mc_samples: 100
    # n_hkl is auto-filled from dataset.yaml (n_hkl.n_unfriedelized for an
    # anomalous run, else n_friedelized); set it here only to override.
    anomalous: true           # merge on miller_idx_unfriedelized (I(+) != I(-))
    wilson_alpha: 1.0
    merge_kl_weight: 1.0
    scaling_lr: 0.005         # decoupled LR for the slow scale field

    # --- anomalous-preserving auxiliary losses ---
    consistency_weight: 0.5
    consistency_pool_friedel: true
    double_wilson_weight: 1.0
    wilson_centric_prior: true

    # --- MLP scale (carries LP; with even-l crystal-frame absorption) ---
    dmin: 1.0
    scale_mlp: true
    scale_mlp_hidden: 128
    scale_mlp_layers: 4
    scale_head_init_std: 0.05
    # beam center / r_max / frame range are auto-filled from dataset.yaml's
    # `scale:` block (written by make_shoeboxes); set them here only to override,
    # or for datasets made before that block existed.
    scale_frame_min: -2.0
    scale_frame_max: 1442.0
    scale_beam_center: [2058.2, 2193.9]
    scale_r_max: 3022
    scale_sh_lmax: 4                      # needs absorption_sh in metadata
    scale_mlp_absorption: false  # even-l SH (Friedel-safe); false = no SH
    scale_mlp_absorption_even_only: true
    predict_keys: [refl_ids, is_test, qi_mean, qi_var, qbg_mean, qbg_var,
      intensity.prf.value, intensity.prf.variance, background.mean, d,
      group_label, qp_mean, qp_loc, qp_scale,
      miller_idx_unfriedelized, miller_idx_friedelized]

optimizer:
  lr: 0.001
  weight_decay: 0.0
  decoder_weight_decay: 0.0
  lr_schedule: null          # set to step_linear_warmup to enable the warmup
  warmup_steps: 1000

encoders:
- name: profile_encoder
  args:
    data_dim: 3d
    input_shape: [3, 21, 21]
    conv1_out_channels: 64
    conv2_out_channels: 128
    dropout: 0.2
- &intensity
  name: intensity_encoder
  args:
    data_dim: 3d
    conv1_out_channels: 64
    conv2_out_channels: 128
    conv3_out_channels: 256
- *intensity
- *intensity
- *intensity

surrogates:
  qp:
    name: learned_basis_profile
    args:
      latent_dim: 12
      init_std: 0.5
      prior_scale: 3.0
      smoothness_weight: 0.02   # was integrator.args.qp_smoothness_weight
  qbg:
    name: gamma                 # was gammaB
    args:
      reparameterization: mean_fano
      eps: 1.0e-06
      k_min: 0.01
loss:
  name: merging_wilson
  args:
    lp_correction: false        # MLP scale already carries LP
    n_bins: 30                  # per-resolution-bin background prior
    # B/G ablation knob: true = learned Wilson G/B envelope; false = fixed
    # tau = 1 (B/G removed, the scale field owns the overall/resolution scale).
    # The base config is identical except for this line.
    use_gb: false
    profile_kl_weight: 1.0      
    background_kl_weight: 1.0  

data_loader:
  name: rotation_data
  args:
    data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
    batch_size: 2048
    validation_split: 0.2
    num_workers: 8
    include_test: true
    subset_size: null
    resolution_cutoff: null
    transform: anscombe
    group_by_asu_id: true
    group_by_key: miller_idx_friedelized   # co-batch I(+)/I(-) mates
    split_by_miller_idx: true   # free-set holdout by reflection (not random obs)
    test_split: 0.1             # fraction of reflections held out as test
    max_obs_per_hkl: null
    ice_ring_ranges: [[1.34, 1.42]]
    shoebox_file_names:
      data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
      counts: counts.npy
      masks: masks.npy
      # make_shoeboxes output; must also carry absorption_sh if
      # scale_mlp_absorption is true.
      reference: metadata.npy

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

checkpoint:
  every_n_epochs: 5
  save_top_k: -1
