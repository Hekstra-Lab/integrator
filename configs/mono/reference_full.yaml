integrator:
  name: hierarchical            # registered integrator; also: hierarchical_3enc
  args:
    data_dim: 3d                # 2d | 3d  (filled from <data_dir>/dataset.yaml if omitted)
    d: 3                        # shoebox depth (z-slices); 1 for 2d
    h: 21                       # shoebox height
    w: 21                       # shoebox width
    encoder_out: 64             # embedding width feeding the surrogates
    mc_samples: 100             # Monte Carlo samples per forward pass
    predict_keys: default       # 'default' or an explicit list of output columns

optimizer:
  lr: 0.001
  weight_decay: 0.0             # Adam weight decay on all params
  decoder_weight_decay: null    # separate decay for the qp decoder; null -> reuse weight_decay
  lr_schedule: null             # null | cosine_warmup | step_linear_warmup
  warmup_epochs: 5              # used by cosine_warmup
  warmup_steps: 0               # used by step_linear_warmup
  lr_min: 1.0e-5                # schedule floor LR (<= lr)

encoders:
  - name: profile_encoder
    args:
      data_dim: 3d
      in_channels: 1
      input_shape: [3, 21, 21]
      encoder_out: 64
      conv1_out_channels: 64
      conv1_kernel_size: [1, 3, 3]
      conv1_padding: [0, 1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [1, 2, 2]
      pool_stride: [1, 2, 2]
      conv2_out_channels: 128
      conv2_kernel_size: [3, 3, 3]
      conv2_padding: [0, 0, 0]
      norm2_num_groups: 4
      dropout: 0.0
  - &intensity_encoder          # 4 intensity encoders: k_i, r_i, k_bg, r_bg
    name: intensity_encoder
    args:
      data_dim: 3d
      in_channels: 1
      encoder_out: 64
      conv1_out_channels: 64
      conv1_kernel_size: [3, 3, 3]
      conv1_padding: [1, 1, 1]
      norm1_num_groups: 4
      pool_kernel_size: [1, 2, 2]
      pool_stride: [1, 2, 2]
      conv2_out_channels: 128
      conv2_kernel_size: [3, 3, 3]
      conv2_padding: [0, 0, 0]
      norm2_num_groups: 4
      conv3_out_channels: 256
      conv3_kernel_size: [3, 3, 3]
      conv3_padding: [1, 1, 1]
      norm3_num_groups: 8
  - *intensity_encoder
  - *intensity_encoder
  - *intensity_encoder

surrogates:
  qp:
    name: learned_basis_profile   # or: dirichlet
    args:
      input_dim: 64               # = encoder_out (injected if omitted)
      latent_dim: 12
      output_dim: 1323            # d*h*w (injected from geometry if omitted)
      init_std: 0.5               # initial posterior std of the latent h
      prior_scale: 3.0            # std of the N(0, prior_scale) latent prior
      smoothness_weight: 0.0      # >0 penalizes spatial roughness of the profile basis
  qbg:
    name: gamma
    args:
      reparameterization: mean_fano  # shape_rate | mean_fano | nakagami  (aliases a|b|e)
      in_features: 64                 # = encoder_out (injected if omitted)
      eps: 1.0e-6
      k_min: 0.01                     # floor on the Gamma shape (rsample stability)
      positive_constraint: softplus   # softplus | exp; or a [head1, head2] pair
  qi:
    name: gamma
    args:
      reparameterization: mean_fano
      in_features: 64
      eps: 1.0e-6
      k_min: 0.01
      positive_constraint: softplus

loss:
  name: monochromatic_wilson
  args:
    # --- intensity (Wilson) prior ---
    init_log_K: 0.0             # init scalar G = softplus(raw_G); mono-only
    lp_correction: false        # multiply tau by metadata['lp']; mono-only
    init_log_B: 3.0             # init Wilson B factor (softplus(raw_B) + b_min)
    b_min: 0.0
    learn_concentration: false  # learn a per-resolution-bin Gamma shape alpha
    init_alpha: 1.0             # init for the per-bin shape when learn_concentration
    n_bins: 1                   # resolution shells (1 = single global Wilson prior)
    # --- KL weights ---
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0
    # --- background prior (scalar Gamma) ---
    bg_rate: 1.0                # auto-filled from <data_dir>/bg_prior.npy when present
    bg_concentration: 1.0
    # --- optional explicit priors (advanced; default off) -----------------
    # pi_cfg:  {name: gamma, params: {concentration: 1.0, rate: 0.5}, weight: 1.0}
    # pbg_cfg: {name: gamma, params: {concentration: 1.0, rate: 0.5}, weight: 1.0}
    # pprf_cfg: {name: dirichlet, params: {concentration: conc.pt, shape: [3, 21, 21]}, weight: 1.0}
    # --- optional learned spatial/spectral priors (advanced; default off) -
    # concentration_cfg: {degree: 4, d_min: 1.5, d_max: 50.0, init_alpha: 1.0}
    # bg_prior_cfg:      {degree: 4, r_min: 0.0, r_max: 1500.0, init_rate: 1.0, init_alpha: 1.0}
    # profile_prior_cfg: {degree: 4, r_min: 0.0, r_max: 1500.0, init_scale: 3.0, fourier_order: 0}

data_loader:
  name: rotation_data
  args:
    data_dir: /path/to/hewl/pytorch_data
    batch_size: 1024
    val_split: 0.2
    num_workers: 8
    include_test: true
    subset_size: null           # cap on reflections loaded (debugging)
    cutoff: null                # resolution cutoff, or null
    min_valid_pixels: 10        # drop shoeboxes with fewer valid pixels
    transform: anscombe         # anscombe | log1p | standardization (derived from dataset.yaml if omitted)
    shoebox_file_names:
      data_dir: /path/to/hewl/pytorch_data
      counts: counts.pt
      masks: masks.pt
      reference: metadata.pt

trainer:
  max_epochs: 40
  accelerator: gpu              # cpu | gpu | auto
  devices: 1
  logger: true
  precision: '32'               # '16' | '32'
  check_val_every_n_epoch: 2
  log_every_n_steps: 1
  enable_checkpointing: true
  deterministic: false
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm # norm | value

# Optional: early stopping (omit the section to disable).
early_stop:
  monitor: val elbo             # any logged metric: {train,val} {elbo,kl,nll}
  mode: min
  patience: 3
  min_delta: 0.0
  strict: true

# Optional: checkpoint selection (defaults keep all epochs).
checkpoint:
  save_top_k: -1                # -1 keeps every (written) ckpt; N keeps best N by monitor
  every_n_epochs: 1             # write a ckpt every N epochs (use with save_top_k=-1 for every Nth)
  monitor: val elbo
  mode: min

# Output paths; used to write overwrite a reflection table
output:
  refl_file: /path/to/reflections.refl
