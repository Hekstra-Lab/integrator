global_vars:
  encoder_out: 32
  mc_samples: 32
  data_dir: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data_dials
  n_bins: 30

integrator:
  name: hierarchicalC_ragged
  args:
    data_dim: 3d
    d: 9
    h: 31
    w: 31
    lr: 0.001
    encoder_out: 64
    weight_decay: 0.0
    mc_samples: 100
    renyi_scale: 0.0
    predict_keys:
    - refl_ids
    - qi_mean
    - qi_var
    - qbg_mean
    - qbg_var
    - intensity.prf.value
    - intensity.prf.variance
    - background.mean
    - d
    - group_label
    - qp_mean
    - qp_mu_h
    - qp_std_h

encoders:
- name: ragged_shoebox_encoder
  args:
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size: [1, 3, 3]
    conv1_padding: [0, 1, 1]
    norm1_num_groups: 4
    pool_kernel_size: [1, 2, 2]
    pool_stride: [1, 2, 2]
    conv2_out_channels: 128
    conv2_kernel_size: [3, 3, 3]
    conv2_padding: [1, 1, 1]    # NOTE: padding=1 (vs 0 in fixed encoder) so small
    norm2_num_groups: 4         # shoeboxes (e.g. (2, 8, 9)) don't shrink to D=0.
    dropout: 0.0
- &id001
  name: ragged_intensity_encoder
  args:
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size: [3, 3, 3]
    conv1_padding: [1, 1, 1]
    norm1_num_groups: 4
    pool_kernel_size: [1, 2, 2]
    pool_stride: [1, 2, 2]
    conv2_out_channels: 128
    conv2_kernel_size: [3, 3, 3]
    conv2_padding: [1, 1, 1]
    norm2_num_groups: 4
    conv3_out_channels: 256
    conv3_kernel_size: [3, 3, 3]
    conv3_padding: [1, 1, 1]
    norm3_num_groups: 8
- *id001   # r_i
- *id001   # k_bg
- *id001   # r_bg

surrogates:
  qp:
    name: ragged_learned_basis_profile
    args:
      input_dim: 64
      d_basis: 8
      basis_hidden: 64
      init_std: 0.5
  qbg:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-06
      mean_init: null
      separate_inputs: true
  qi:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-06
      mean_init: null
      mu_parameterization: log
      separate_inputs: true

loss:
  name: wilson
  args:
    mc_samples: 100
    eps: 1.0e-06
    n_bins: 30
    bg_rate_per_group: bg_rate_per_group.pt
    profile_sigma_prior: 3.0
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0

data_loader:
  name: ragged_data
  args:
    data_dir: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data_dials
    batch_size: 128
    val_frac: 0.05
    test_frac: 0.05
    num_workers: 4
    bucket_mult: 50
    keys: ["mask"]
    seed: 0
    eager: true
    # log1p, no standardization — matches scvi-tools' `log_variational=True`
    # recipe (the literature standard for skewed-count VAEs spanning 0 → 10⁵+
    # counts). Encoder GroupNorm handles per-batch normalization. Anscombe
    # + global z-score was the original approach, but the bright-tail
    # influence on the global std collapsed bulk voxels near zero on this
    # ragged dataset and contributed to the qbg NaN around step 70.
    transform: log1p
    anscombe: true   # legacy flag; ignored when transform != "anscombe"
    max_count: 131072.0
    protect_foreground: true
    min_valid_pixels: 10
    group_labels_path: group_labels_30.pt
    extra_metadata_keys: []

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

logger:
  d: 9
  h: 33
  w: 33

output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data_dials/reflections.refl
