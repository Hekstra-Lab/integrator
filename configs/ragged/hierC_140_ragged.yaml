global_vars:
  encoder_out: 32
  mc_samples: 32
  data_dir: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data_dials
  n_bins: 30

integrator:
  name: hierarchicalC_ragged
  args:
    data_dim: 3d
    d: 9
    h: 31
    w: 31
    lr: 0.001
    encoder_out: 64
    weight_decay: 0.0
    mc_samples: 100
    renyi_scale: 0.0
    # Step-level linear warmup. The init diagnostic showed initial
    # qi/qbg head gradients of 1e4–1e5 magnitude (varies ~1000× across
    # seeds). Adam's running moment estimates need ~few hundred steps
    # to stabilize, during which lr=1e-3 step magnitude can push raw
    # weights into the unstable region. Ramping lr 0 → 1e-3 over the
    # first 500 steps absorbs that gradient spike.
    lr_schedule: step_linear_warmup
    warmup_steps: 500
    predict_keys:
    - refl_ids
    - qi_mean
    - qi_var
    - qbg_mean
    - qbg_var
    - intensity.prf.value
    - intensity.prf.variance
    - background.mean
    - d
    - group_label
    - qp_mean
    - qp_mu_h
    - qp_std_h

encoders:
- name: ragged_shoebox_encoder
  args:
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size: [1, 3, 3]
    conv1_padding: [0, 1, 1]
    norm1_num_groups: 4
    pool_kernel_size: [1, 2, 2]
    pool_stride: [1, 2, 2]
    conv2_out_channels: 128
    conv2_kernel_size: [3, 3, 3]
    conv2_padding: [1, 1, 1]    # NOTE: padding=1 (vs 0 in fixed encoder) so small
    norm2_num_groups: 4         # shoeboxes (e.g. (2, 8, 9)) don't shrink to D=0.
    dropout: 0.0
- &id001
  name: ragged_intensity_encoder
  args:
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size: [3, 3, 3]
    conv1_padding: [1, 1, 1]
    norm1_num_groups: 4
    pool_kernel_size: [1, 2, 2]
    pool_stride: [1, 2, 2]
    conv2_out_channels: 128
    conv2_kernel_size: [3, 3, 3]
    conv2_padding: [1, 1, 1]
    norm2_num_groups: 4
    conv3_out_channels: 256
    conv3_kernel_size: [3, 3, 3]
    conv3_padding: [1, 1, 1]
    norm3_num_groups: 8
- *id001   # r_i
- *id001   # k_bg
- *id001   # r_bg

surrogates:
  qp:
    name: ragged_learned_basis_profile
    args:
      input_dim: 64
      d_basis: 8
      basis_hidden: 64
      init_std: 0.5
  qbg:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-06
      # mean_init triggers head zero-init: linear_mu.weight and
      # linear_fano.weight are zeroed in addition to setting their
      # biases. Effect: every reflection in the batch starts at
      # mu = mean_init, fano = fano_init, eliminating the
      # ~1000× seed-to-seed grad-max spread the diagnostic surfaced.
      # 30 ≈ median bg across resolution bins (1/τ from
      # bg_rate_per_group_30.pt is in the 13–220 range).
      mean_init: 30.0
      fano_init: 1.0
      separate_inputs: true
      # Soft floor on k = mu/fano so the rsample backward stays NaN-safe
      # when fano drifts large. r is recomputed as k/mu so the predicted
      # mean stays exactly mu (preserves the (mu, fano) → Laplace fit
      # in the well-behaved region; only the variance is implicitly
      # bounded in the unstable corner).
      floor_k_min: 0.1
  qi:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-06
      # 100 is well below the auto-injected qi_median=5777 that broke
      # things on this dataset (the resulting Wilson KL gradient was
      # huge); above 1.0 we'd start at, with mean_init: null, which is
      # also bad in the other direction (NLL gradient huge because
      # rate ≈ 1 vs counts ≈ 1000s). 100 is a compromise between the
      # NLL and KL pull at step 0.
      mean_init: 100.0
      fano_init: 1.0
      mu_parameterization: log
      separate_inputs: true
      floor_k_min: 0.1

loss:
  name: wilson
  args:
    mc_samples: 100
    eps: 1.0e-06
    n_bins: 30
    bg_rate_per_group: bg_rate_per_group.pt
    profile_sigma_prior: 3.0
    pi_weight: 1.0
    pbg_weight: 1.0
    pprf_weight: 1.0

data_loader:
  name: ragged_data
  args:
    data_dir: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data_dials
    batch_size: 128
    val_frac: 0.05
    test_frac: 0.05
    num_workers: 4
    bucket_mult: 50
    keys: ["mask"]
    seed: 0
    eager: true
    transform: log1p
    anscombe: true   # legacy flag; ignored when transform != "anscombe"
    max_count: 131072.0
    protect_foreground: true
    min_valid_pixels: 10
    group_labels_path: group_labels_30.pt
    extra_metadata_keys: []

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

logger:
  d: 9
  h: 33
  w: 33

output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/140/pytorch_data_dials/reflections.refl
