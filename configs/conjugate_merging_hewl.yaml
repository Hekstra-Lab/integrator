integrator:
  name: conjugate_merging
  args:
    data_dim: 3d
    d: &d 3
    h: &h 21
    w: &w 21
    lr: 0.001
    encoder_out: &encoder_out 64
    weight_decay: 0.0
    decoder_weight_decay: 0.0
    qp_smoothness_weight: 1.0e-3
    qp_orthogonality_weight: 0.0
    mc_samples: &mc_samples 100
    predict_keys:
      [refl_ids, is_test, qi_mean, qi_var, qbg_mean, qbg_var,
       intensity.prf.value, intensity.prf.variance, background.mean,
       d, group_label, qp_mean, qp_loc, qp_scale, asu_id]

    # Conjugate Bayesian merging: I_h derived from sufficient statistics.
    # No per-HKL embedding, no I encoder. Encoders predict profile+bg only.
    n_hkl: 86402
    wilson_alpha: 1.0       # alpha_W = 1 (Exponential / acentric Wilson)
    ema_momentum: 0.9       # EMA for the (alpha_h, beta_h) buffer
    sample_I_h: true        # sample I_h for the reconstruction NLL (proper MC ELBO)
    # ELBO-consistent merge_kl_weight = N_HKL / N_obs (~0.04 for HEWL).
    # Raise above for stronger Wilson regularization.
    merge_kl_weight: 0.05

    # MLP scale (physics-aware: frame, detector x/y, lp, d)
    scale_mlp: true
    scale_mlp_hidden: 64
    scale_mlp_layers: 2
    scale_frame_min: -2.0
    scale_frame_max: 1442.0
    scale_beam_center: [2058.2, 2193.9]
    scale_r_max: 3022

# Three encoders only: profile + (k_bg, r_bg). No intensity encoder.
encoders:
- name: profile_encoder
  args:
    data_dim: 3d
    input_shape: [*d, *h, *w]
    encoder_out: *encoder_out
    conv1_out_channels: 64
    conv2_out_channels: 128
    dropout: 0.2
- &bg_enc
  name: intensity_encoder
  args:
    data_dim: 3d
    encoder_out: *encoder_out
    conv1_out_channels: 64
    conv2_out_channels: 128
    conv3_out_channels: 256
- *bg_enc

# Two surrogates: profile + background. NO qi (I_h is derived).
surrogates:
  qp:
    name: learned_basis_profile
    args:
      warmstart_basis_path: hermite_profile_basis.pt
      hermite_max_order: 4
      hermite_basis_sigma: 3.0
      hermite_sigma_z: 1.0
      hermite_max_order_z: 1
      input_dim: *encoder_out
      output_dim: 1323
      init_std: 0.5
  qbg:
    name: gammaB
    args:
      in_features: *encoder_out
      eps: 1.0e-06
      k_min: 0.01
      mu_positive_constraint: softplus

loss:
  name: monochromatic_wilson
  args:
    lp_correction: false
    mc_samples: *mc_samples
    eps: 1.0e-06
    n_bins: 30
    profile_prior_scale: 3.0
    # pi_weight=0: integrator's per-obs intensity KL is skipped; this model
    # applies the closed-form Gamma-Gamma KL on per-HKL q(I_h) directly.
    pi_weight: 0.0
    pbg_weight: 1.0
    pprf_weight: 1.0

data_loader:
  name: rotation_data
  args:
    data_dir: &data_dir /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
    batch_size: 2048
    val_split: 0.2
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    # Required: sufficient statistics need complete HKL groups per batch.
    group_by_asu_id: true
    max_obs_per_hkl: null
    shoebox_file_names:
      data_dir: *data_dir
      counts: counts.npy
      masks: masks.npy
      stats: anscombe_stats.pt
      reference: metadata.pt
      standardized_counts: null
    D: *d
    H: *h
    W: *w
    anscombe: true

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 5
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

logger:
  d: *d
  h: *h
  w: *w

output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data/reflections_.refl
  dials_merge_html: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/merged_reference.html
  phenix_refine_log: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/refine_001.log
  anomalous_peaks: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/reference_peaks.csv
  phenix_eff: /n/holylabs/LABS/hekstra_lab/Users/laldama/integrato_refac/integrator/reference_data/phenix.eff
  pdb: /n/holylabs/LABS/hekstra_lab/Users/laldama/integrato_refac/integrator/reference_data/9b7c.pdb
  expt_file: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/dials_2026-05-14/integrated.expt
