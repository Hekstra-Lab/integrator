global_vars:
  encoder_out: 64
  mc_samples: 100
  data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
  d: 3
  h: 21
  w: 21
integrator:
  name: modelb
  args:
    data_dim: 3d
    d: 3
    h: 21
    w: 21
    lr: 0.001
    encoder_out: 64
    weight_decay: 0.0
    mc_samples: 100
    renyi_scale: 0.0
    predict_keys:
    - refl_ids
    - is_test
    - qi_mean
    - qi_var
    - qbg_mean
    - qbg_var
    - intensity.prf.value
    - intensity.prf.variance
    - background.mean
    - d
encoders:
- name: shoebox_encoder
  args:
    data_dim: 3d
    input_shape:
    - 3
    - 21
    - 21
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size:
    - 1
    - 3
    - 3
    conv1_padding:
    - 0
    - 1
    - 1
    norm1_num_groups: 4
    pool_kernel_size:
    - 1
    - 2
    - 2
    pool_stride:
    - 1
    - 2
    - 2
    conv2_out_channels: 128
    conv2_kernel_size:
    - 3
    - 3
    - 3
    conv2_padding:
    - 0
    - 0
    - 0
    norm2_num_groups: 4
- name: intensity_encoder
  args:
    data_dim: 3d
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size:
    - 3
    - 3
    - 3
    conv1_padding:
    - 1
    - 1
    - 1
    norm1_num_groups: 4
    pool_kernel_size:
    - 1
    - 2
    - 2
    pool_stride:
    - 1
    - 2
    - 2
    conv2_out_channels: 128
    conv2_kernel_size:
    - 3
    - 3
    - 3
    conv2_padding:
    - 0
    - 0
    - 0
    norm2_num_groups: 4
    conv3_out_channels: 256
    conv3_kernel_size:
    - 3
    - 3
    - 3
    conv3_padding:
    - 1
    - 1
    - 1
    norm3_num_groups: 8
- name: intensity_encoder
  args:
    data_dim: 3d
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size:
    - 3
    - 3
    - 3
    conv1_padding:
    - 1
    - 1
    - 1
    norm1_num_groups: 4
    pool_kernel_size:
    - 1
    - 2
    - 2
    pool_stride:
    - 1
    - 2
    - 2
    conv2_out_channels: 128
    conv2_kernel_size:
    - 3
    - 3
    - 3
    conv2_padding:
    - 0
    - 0
    - 0
    norm2_num_groups: 4
    conv3_out_channels: 256
    conv3_kernel_size:
    - 3
    - 3
    - 3
    conv3_padding:
    - 1
    - 1
    - 1
    norm3_num_groups: 8
surrogates:
  qp:
    name: dirichlet
    args:
      in_features: 64
      sbox_shape:
      - 3
      - 21
      - 21
      eps: 1.0e-06
  qbg:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-06
  qi:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-06
loss:
  name: default
  args:
    mc_samples: 100
    eps: 1.0e-06
    pprf_cfg:
      name: dirichlet
      params:
        concentration: 0.01
        shape:
        - 3
        - 21
        - 21
      weight: 0.001
    pbg_cfg:
      name: exponential
      params:
        rate: 1.0
      weight: 0.5
    pi_cfg:
      name: exponential
      params:
        rate: 1.0
      weight: 0.5
data_loader:
  name: default
  args:
    data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
    batch_size: 2048
    val_split: 0.3
    test_split: 0.0
    num_workers: 8
    include_test: false
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data
      counts: counts.pt
      masks: masks.pt
      stats: anscombe_stats.pt
      reference: metadata.pt
      standardized_counts: null
    D: 3
    H: 21
    W: 21
    anscombe: true
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 2
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
logger:
  d: 3
  h: 21
  w: 21
output:
  refl_file: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/pytorch_data/reflections_.refl
  dials_merge_html: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/merged_reference.html
  phenix_refine_log: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/refine_001.log
  anomalous_peaks: /n/hekstra_lab/people/aldama/integrator_data/hewl_9b7c/reference_data/reference_peaks.csv
