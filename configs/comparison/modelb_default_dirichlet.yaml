global_vars:
  encoder_out: 64
  mc_samples: 100
  data_dir: /path/to/experimental/data
  d: 3
  h: 21
  w: 21
integrator:
  name: modelb
  args:
    data_dim: 3d
    d: 3
    h: 21
    w: 21
    lr: 0.001
    encoder_out: 64
    weight_decay: 0.0
    mc_samples: 100
    renyi_scale: 0.0
    predict_keys:
    - refl_ids
    - is_test
    - qi_mean
    - qi_var
    - qbg_mean
    - qbg_var
    - intensity.prf.value
    - background.mean
encoders:
- name: shoebox_encoder
  args:
    data_dim: 3d
    input_shape:
    - 3
    - 21
    - 21
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size:
    - 1
    - 3
    - 3
    conv1_padding:
    - 0
    - 1
    - 1
    norm1_num_groups: 4
    pool_kernel_size:
    - 1
    - 2
    - 2
    pool_stride:
    - 1
    - 2
    - 2
    conv2_out_channels: 128
    conv2_kernel_size:
    - 3
    - 3
    - 3
    conv2_padding:
    - 0
    - 0
    - 0
    norm2_num_groups: 4
- name: intensity_encoder
  args:
    data_dim: 3d
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size:
    - 3
    - 3
    - 3
    conv1_padding:
    - 1
    - 1
    - 1
    norm1_num_groups: 4
    pool_kernel_size:
    - 1
    - 2
    - 2
    pool_stride:
    - 1
    - 2
    - 2
    conv2_out_channels: 128
    conv2_kernel_size:
    - 3
    - 3
    - 3
    conv2_padding:
    - 0
    - 0
    - 0
    norm2_num_groups: 4
    conv3_out_channels: 256
    conv3_kernel_size:
    - 3
    - 3
    - 3
    conv3_padding:
    - 1
    - 1
    - 1
    norm3_num_groups: 8
- name: intensity_encoder
  args:
    data_dim: 3d
    in_channels: 1
    encoder_out: 64
    conv1_out_channels: 64
    conv1_kernel_size:
    - 3
    - 3
    - 3
    conv1_padding:
    - 1
    - 1
    - 1
    norm1_num_groups: 4
    pool_kernel_size:
    - 1
    - 2
    - 2
    pool_stride:
    - 1
    - 2
    - 2
    conv2_out_channels: 128
    conv2_kernel_size:
    - 3
    - 3
    - 3
    conv2_padding:
    - 0
    - 0
    - 0
    norm2_num_groups: 4
    conv3_out_channels: 256
    conv3_kernel_size:
    - 3
    - 3
    - 3
    conv3_padding:
    - 1
    - 1
    - 1
    norm3_num_groups: 8
surrogates:
  qp:
    name: dirichlet
    args:
      in_features: 64
      sbox_shape:
      - 3
      - 21
      - 21
  qbg:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-05
  qi:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-05
loss:
  name: default
  args:
    mc_samples: 100
    eps: 1.0e-05
data_loader:
  name: default
  args:
    data_dir: /path/to/experimental/data
    batch_size: 2048
    val_split: 0.2
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: /path/to/experimental/data
      counts: counts.pt
      masks: masks.pt
      stats: stats_anscombe.pt
      reference: metadata.pt
      standardized_counts: null
    D: 3
    H: 21
    W: 21
    anscombe: true
trainer:
  max_epochs: 1000
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 50
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
logger:
  d: 3
  h: 21
  w: 21
