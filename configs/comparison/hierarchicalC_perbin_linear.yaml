global_vars:
  encoder_out: 64
  mc_samples: 100
  data_dir: /path/to/experimental/data
  d: 3
  h: 21
  w: 21
integrator:
  name: hierarchicalC
  args:
    data_dim: 3d
    d: 3
    h: 21
    w: 21
    lr: 0.001
    encoder_out: 64
    weight_decay: 0.0
    mc_samples: 100
    renyi_scale: 0.0
    predict_keys:
    - refl_ids
    - is_test
    - qi_mean
    - qi_var
    - qbg_mean
    - qbg_var
    - intensity.prf.value
    - background.mean
    - group_label
    - tau_per_refl
