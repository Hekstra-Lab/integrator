surrogates:
  qp:
    name: learned_basis_profile
    args:
      input_dim: 64
      latent_dim: 8
      output_dim: 1323
      sigma_prior: 3.0
  qbg:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-05
  qi:
    name: gammaB
    args:
      in_features: 64
      eps: 1.0e-05
loss:
  name: per_bin
  args:
    mc_samples: 100
    eps: 1.0e-05
    n_bins: 20
    # Per-bin data files (auto-generated if missing)
    tau_per_group: tau_per_group.pt
    bg_rate_per_group: bg_rate_per_group.pt
    # Intensity prior: "exponential" (alpha=1) or "gamma" (per-bin MLE alpha)
    pi_cfg:
      name: exponential
      params:
        rate: 1.0
      weight: 1.0
    # Background prior: "exponential" (alpha=1) or "gamma" (per-bin MLE alpha)
    pbg_cfg:
      name: exponential
      params:
        rate: 1.0
      weight: 1.0
    # Profile prior
    pprf_cfg:
      name: gaussian_profile
      params: {}
      weight: 1.0
data_loader:
  name: default
  args:
    data_dir: /path/to/experimental/data
    batch_size: 2048
    val_split: 0.2
    test_split: 0.0
    num_workers: 8
    include_test: true
    subset_size: null
    cutoff: null
    shoebox_file_names:
      data_dir: /path/to/experimental/data
      counts: counts.pt
      masks: masks.pt
      stats: stats_anscombe.pt
      reference: metadata.pt
      standardized_counts: null
    D: 3
    H: 21
    W: 21
    anscombe: true
trainer:
  max_epochs: 1000
  accelerator: gpu
  devices: 1
  logger: true
  precision: '32'
  check_val_every_n_epoch: 50
  log_every_n_steps: 1
  deterministic: false
  enable_checkpointing: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
logger:
  d: 3
  h: 21
  w: 21
